services:
  penceai:
    build:
      context: .
      dockerfile: Dockerfile
    image: penceai:latest
    container_name: penceai_agent
    ports:
      - "3001:3001"
    volumes:
      # Veritabaninin kalici olarak host makinesinde tutulmasi
      - ./data:/app/data
    # .env dosyasi volume olarak baglanmaz (dizin olusma riski)
    # Bunun yerine env_file direktifi ile ortam degiskenleri yuklenir
    env_file:
      - path: .env
        required: false
    environment:
      # Docker konteynerinde dis baglantilar icin 0.0.0.0 dinlenmeli
      # (localhost sadece konteyner icerisinde loopback'e baglanir)
      - HOST=0.0.0.0
      - PORT=3001
      # DB_PATH zorunlu dizini ayarliyoruz ki Docker icerisindeki volume noktasina yazsin
      - DB_PATH=/app/data/penceai.db
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => { process.exit(r.ok ? 0 : 1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3